<div class="number-line-container" data-cy="interaction-number-line">
  <div class="svg-container">
    <svg width="1000" height="400" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
                markerWidth="6" markerHeight="6"
                orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" />
        </marker>
      </defs>
      @if (localParameters.style === 'RULER') {
        <path
          #numberLinePath
          id="numberLinePath"
          d="M 10 90 H 590"
          stroke="black"
          stroke-width="2"
          fill="transparent"
          marker-end="url(#arrow)" />
      } @else {
        <path
          #numberLinePath
          id="numberLinePath"
          d="M 10 90 C 150 10, 270 10, 360 90 S 530 160, 590 90"
          stroke="black"
          fill="transparent" />
      }

      @for (item of numberLineItems(); track item.value) {
        <g [attr.transform]="'translate(' + item.x + ',' + item.y + ')'" data-cy="number-line-item">
          @if (item.isEmpty) {
            @if (localParameters.style === 'RULER') {
              <g transform="translate(0, -30)" data-cy="number-input-group">
                <line x1="0" y1="30" x2="0" y2="0" stroke="#1154f8" stroke-width="2" />
                <rect x="-20" y="-44" width="40" height="44" rx="2" ry="2"
                      class="number-input-field"
                      fill="white" stroke="black" data-cy="number-input-box" />
                <text x="0" y="-22" text-anchor="middle" dominant-baseline="central"
                      class="number-input-text" data-cy="number-input-text">
                  {{ numberInputValue }}
                </text>
              </g>
            } @else {
              <rect x="-20" y="-22" width="40" height="44" rx="2" ry="2"
                    class="number-input-field"
                    fill="white" stroke="black" data-cy="number-input-box" />
              <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
                    class="number-input-text" data-cy="number-input-text">
                {{ numberInputValue }}
              </text>
            }
          } @else if (item.isTickOnly) {
            <line x1="0" y1="-10" x2="0" y2="10" stroke="black" stroke-width="1.5" data-cy="tick-mark" />
          } @else {
            @if (localParameters.style === 'RULER') {
              <line x1="0" y1="-15" x2="0" y2="15" stroke="black" stroke-width="2" data-cy="ruler-tick-mark" />
              <text x="0" y="30" text-anchor="middle" dominant-baseline="central"
                    class="number-text" data-cy="number-label">
                {{ item.value }}
              </text>
            } @else {
              <rect x="-20" y="-22" width="40" height="44" rx="2" ry="2"
                    fill="white" stroke="black" data-cy="number-box" />
              <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
                    class="number-text" data-cy="number-label">
                {{ item.value }}
              </text>
            }
          }
        </g>
      }
    </svg>
  </div>

  <div class="keyboard-wrapper" data-cy="keyboard-wrapper">
    @for (button of numbersList; track $index) {
      <button type="button"
              class="keyboard-button"
              [attr.aria-label]="button"
              (click)="handleKeyboardClick(button)"
              [disabled]="isDisabled"
              [attr.data-cy]="'keyboard-button-' + button"
      >
        {{ button }}
      </button>
    }
    <button type="button"
            class="keyboard-button backspace-button"
            [attr.aria-label]="'Backspace'"
            (click)="handleBackButtonClick()"
            [disabled]="numberInputValue.length === 0"
            [attr.data-cy]="'backspace-button'"
    >
      <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 -960 960 960" width="32"
           fill="currentColor">
        <path d="m456-320 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 160q-19 0-36-8.5T296-192L80-480l216-288q11-15 28-23.5t36-8.5h440q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H360ZM180-480l180 240h440v-480H360L180-480Zm400 0Z"/>
      </svg>
    </button>
    </div>
</div>
